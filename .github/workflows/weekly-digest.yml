name: Weekly RSS Digest

on:
  # Runs every Monday at 8:00 AM UTC
  # Adjust the cron expression to your preferred time/day:
  #   https://crontab.guru/
  schedule:
    - cron: '0 8 * * 1'

  # Lets you trigger the workflow manually from the Actions tab
  # (useful for testing without waiting for Monday)
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run weekly digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: node src/index.js
